<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOM-FINDER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <nav>
            <a href="#"><b>Home</b></a>
            <div class="menu">
                <a href="#"><b>List Your Property</b></a>
                <a href="#"><b>Login</b></a>
            </div>
        </nav>
        <div class="content">
            <h1>Find Your Ideal Boardinghouse Near CBU</h1>
            <h3>Affordable • Safe • Student-Friendly</h3>
            <section class="search">
              <div class="icon">
                <img class="icon8" src="L.png" alt="location">
                <input type="text" placeholder="Enter Location">
              </div>
                <input type="text" placeholder="Price-Range">
                <button>Search</button>
            </section>
        </div>
    </div>
    <div>
        <h2>FEATURED LISTINGS</h2>
        <ul class="fl">
            <li>
                <img src="im1.jpg" alt="Riverside Boardinghouse">
                <p><b>K1200</b>/month</p>
                <p>Riverside</p>
                <button class="vd">
                    <a href="#" class="riverside">View Details</a>
                </button>
            </li>
            <li>
                <img src="im2.jpg" alt="Nkana East">
                <p><b>K1000</b>/month</p>
                <p>Nkana East</p>
                <button class="vd">
                    <a href="#"> View Details</a>
                </button>
            </li>
            <li>
                <img src="img3.png" alt="Chipata">
                <p><b>K800</b>/month</p>
                <p>Chipata</p>
                <button class="vd">
                    <a href="#">View Details</a>
                </button>
            </li>
        </ul>
    </div>
    <footer>
        <ul>
            <li class="f1"><a class="flink" href="#">About us</a></li>
            <li class="f2"><a class="flink1" href="#">Contact Us</a></li>
            <li><p class="fu">Follow Us</p></li>
        </ul>    
        <div class="icons">
          <img class="fb" src="logo1.png" alt="Facebook">
          <img class="ig" src="logo2.png" alt="Instagram">
          <img class="x" src="logo3.png" alt="X"
        </div>
    </footer>
</body>
</html>
